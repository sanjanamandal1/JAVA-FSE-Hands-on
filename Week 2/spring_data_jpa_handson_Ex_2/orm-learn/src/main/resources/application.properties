# ============================================================
# Default: in-memory H2 database so the demo runs out-of-the-box.
# schema.sql / data.sql (in this same folder) are auto-executed by
# Spring Boot on startup to create tables and load sample data.
# ============================================================
spring.datasource.url=jdbc:h2:mem:ormlearn;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.com.cognizant.ormlearn=DEBUG

# ============================================================
# To run against MySQL instead (matches the original hands-on),
# comment out the H2 block above and uncomment this block:
# ============================================================
# spring.datasource.url=jdbc:mysql://localhost:3306/ormlearn?useSSL=false&serverTimezone=UTC
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=root
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
# spring.sql.init.mode=never
